<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>T09 笔记协作 · 学科大脑</title>
<link rel="stylesheet" href="assets/tokens.css" /><link rel="stylesheet" href="assets/style.css" />
</head><body data-page="t09">
<div class="layout">
  <aside class="sidebar" id="sidebar-mount"></aside>
  <main class="main">
    <header class="topbar"><div><span class="title">笔记与协作</span><span class="crumbs">内容管理 / T09 笔记协作</span></div>
      <div class="search"><i data-lucide="search" width="14" height="14"></i><input placeholder="搜索文档" /></div></header>
    <div class="content">
      <section class="page-header">
        <div class="left"><span class="code-badge">T09</span><div><h1>笔记与文档协作</h1><div class="subtitle">师生共享笔记 / 批注 / 讨论，问答结果保存与白板输入</div></div></div>
        <div class="actions"><button class="btn"><i data-lucide="download" width="14" height="14"></i>导出</button>
          <button class="btn btn-primary"><i data-lucide="plus" width="14" height="14"></i>新建笔记</button></div>
      </section>
      <section class="kpi-row" id="kpi-row"></section>
      <section class="filter-bar">
        <select id="f-type"><option value="">全部类型</option><option value="note">课程笔记</option><option value="lab">实验报告</option><option value="minute">讨论纪要</option></select>
        <select id="f-subject"><option value="">全部学科</option></select>
        <select id="f-status"><option value="">全部状态</option><option value="editing">编辑中</option><option value="published">已定稿</option><option value="archived">已归档</option></select>
        <input id="f-search" class="search-input" type="text" placeholder="搜索文档名" />
        <span class="spacer"></span><button class="btn btn-sm">批量归档</button>
      </section>
      <div class="panel"><table class="data" id="tbl">
        <thead><tr><th>文档</th><th>类型</th><th>学科 / 课程</th><th>协作者</th><th style="text-align:right">批注</th><th>版本</th><th>状态</th><th>更新</th></tr></thead><tbody></tbody></table></div>
    </div>
  </main>
</div>
<aside class="drawer" id="drawer"><div class="drawer-head"><span class="title">文档详情</span><button class="close"><i data-lucide="x" width="16" height="16"></i></button></div><div class="drawer-body"></div></aside>
<div class="drawer-mask" id="drawer-mask"></div>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="assets/data.js"></script><script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const S=window.MOCK.ndStats, list=window.MOCK.ndDocs, meta=window.MOCK.ndStatusMeta, tm=window.MOCK.ndTypeMeta;
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-card"><div class="label">文档总数</div><div class="value">${S.total}<span class="unit">份</span></div><div class="delta up">↑ 26 本周</div></div>
    <div class="kpi-card"><div class="label">活跃协作者</div><div class="value">${S.activeCollaborators}<span class="unit">人</span></div><div class="delta up">↑ 8%</div></div>
    <div class="kpi-card"><div class="label">累计批注</div><div class="value">${window.fmtNum(S.activity)}<span class="unit">条</span></div><div class="delta up">↑ 15%</div></div>
    <div class="kpi-card"><div class="label">收藏数</div><div class="value">${S.favorites}<span class="unit">次</span></div><div class="delta up">↑ 3.2%</div></div>`;
  document.getElementById('f-subject').innerHTML += window.MOCK.subjects.map(s=>`<option value="${s}">${s}</option>`).join('');

  function render(rows){
    document.querySelector('#tbl tbody').innerHTML = rows.map((d,i)=>`
      <tr data-idx="${i}">
        <td class="strong" style="max-width:280px;"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.name}</div><div style="font-size:var(--fs-xs);color:var(--text-4);">${d.id}</div></td>
        <td><span class="chip">${tm[d.type]}</span></td>
        <td><span class="chip">${d.subject}</span><div style="font-size:var(--fs-xs);color:var(--text-3);margin-top:2px;">${d.course}</div></td>
        <td><div class="avatar-stack">${d.collaborators.slice(0,4).map(c=>`<div class="avatar">${c.name[0]}</div>`).join('')}${d.collaborators.length>4?`<div class="avatar" style="background:var(--bg);color:var(--text-3);">+${d.collaborators.length-4}</div>`:''}</div></td>
        <td style="text-align:right" class="num">${d.annotations}</td>
        <td class="num" style="color:var(--text-3);">${d.version}</td>
        <td><span class="chip ${meta[d.status].tone}">${meta[d.status].text}</span></td>
        <td class="num">${d.updatedAt}</td>
      </tr>`).join('');
    document.querySelectorAll('#tbl tbody tr').forEach(tr=>tr.addEventListener('click',()=>openNd(rows[+tr.dataset.idx])));
  }
  render(list.slice(0,26));

  function openNd(d){
    window.__openDrawer(`
      <div class="drawer-meta">
        <div class="row"><span class="k">ID</span><span class="v">${d.id}</span></div>
        <div class="row"><span class="k">类型</span><span class="v">${tm[d.type]}</span></div>
        <div class="row"><span class="k">学科</span><span class="v">${d.subject}</span></div>
        <div class="row"><span class="k">课程</span><span class="v">${d.course}</span></div>
        <div class="row"><span class="k">版本</span><span class="v num">${d.version}</span></div>
        <div class="row"><span class="k">批注</span><span class="v num">${d.annotations}</span></div>
      </div>
      <div class="drawer-section"><h4>协作者（${d.collaborators.length}）</h4>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">${d.collaborators.map(c=>`<span class="chip"><span class="avatar" style="width:18px;height:18px;font-size:10px;margin-right:6px;">${c.name[0]}</span>${c.name}</span>`).join('')}</div>
      </div>
      <div class="drawer-section"><h4>活动流</h4>
        <div class="timeline">${d.activities.map(a=>`<div class="item"><span class="at">${a.at}</span><span class="who">${a.who}</span><span class="action">${a.action} · ${a.target}</span></div>`).join('')}</div>
      </div>`, d.name);
  }

  initTableSort('#tbl');
  const filter=()=>{const sub=document.getElementById('f-subject').value,st=document.getElementById('f-status').value,tp=document.getElementById('f-type').value,q=document.getElementById('f-search').value.toLowerCase();
    render(list.filter(d=>(!sub||d.subject===sub)&&(!st||d.status===st)&&(!tp||d.type===tp)&&(!q||d.name.toLowerCase().includes(q))).slice(0,30));};
  ['f-subject','f-status','f-type'].forEach(id=>document.getElementById(id).addEventListener('change',filter));
  document.getElementById('f-search').addEventListener('input',filter);
  lucide.createIcons();
});
</script>
</body></html>
