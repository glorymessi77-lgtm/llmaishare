<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>T03 知识图谱标注 · 学科大脑</title>
<link rel="stylesheet" href="assets/tokens.css" /><link rel="stylesheet" href="assets/style.css" />
</head><body data-page="t03">
<div class="layout">
  <aside class="sidebar" id="sidebar-mount"></aside>
  <main class="main">
    <header class="topbar"><div><span class="title">知识图谱标注</span><span class="crumbs">知识构建 / T03 图谱标注</span></div>
      <div class="search"><i data-lucide="search" width="14" height="14"></i><input placeholder="搜索节点" /></div></header>
    <div class="content">
      <section class="page-header">
        <div class="left"><span class="code-badge">T03</span><div><h1>知识图谱标注工具</h1><div class="subtitle">构建概念节点与先修 / 包含 / 相关关系，可视化展示与 KAG 转换</div></div></div>
        <div class="actions"><button class="btn"><i data-lucide="share-2" width="14" height="14"></i>图谱视图</button>
          <button class="btn btn-primary"><i data-lucide="plus" width="14" height="14"></i>新增节点</button></div>
      </section>
      <section class="kpi-row" id="kpi-row"></section>
      <section class="filter-bar">
        <select id="f-subject"><option value="">全部学科</option></select>
        <select id="f-status"><option value="">全部状态</option><option value="published">已发布</option><option value="pending">待审核</option><option value="draft">草稿</option></select>
        <select id="f-reltype"><option value="">全部关系</option><option>先修</option><option>包含</option><option>相关</option><option>同义</option></select>
        <input id="f-search" class="search-input" type="text" placeholder="搜索概念节点" />
        <span class="spacer"></span><button class="btn btn-sm">批量审核</button>
      </section>
      <div class="panel"><table class="data" id="tbl">
        <thead><tr><th>节点</th><th>学科</th><th style="text-align:right">关系数</th><th>状态</th><th>标注人</th><th>更新</th></tr></thead><tbody></tbody></table></div>
    </div>
  </main>
</div>
<aside class="drawer" id="drawer"><div class="drawer-head"><span class="title">节点详情</span><button class="close"><i data-lucide="x" width="16" height="16"></i></button></div><div class="drawer-body"></div></aside>
<div class="drawer-mask" id="drawer-mask"></div>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="assets/data.js"></script><script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const S=window.MOCK.graphStats, list=window.MOCK.nodes, meta=window.MOCK.nodeStatusMeta, rt=window.MOCK.relTypeMeta;
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-card"><div class="label">节点总数</div><div class="value">${S.total}<span class="unit">个</span></div><div class="delta up">↑ 6 本周</div></div>
    <div class="kpi-card"><div class="label">关系总数</div><div class="value">${S.relations}<span class="unit">条</span></div><div class="delta up">↑ 8.2%</div></div>
    <div class="kpi-card"><div class="label">待审核</div><div class="value">${S.pending}<span class="unit">个</span></div><div class="delta flat">分配中</div></div>
    <div class="kpi-card"><div class="label">学科覆盖</div><div class="value">${S.coverage}<span class="unit">%</span></div><div class="delta up">↑ 4%</div></div>`;
  document.getElementById('f-subject').innerHTML += window.MOCK.subjects.map(s=>`<option value="${s}">${s}</option>`).join('');

  function render(rows){
    document.querySelector('#tbl tbody').innerHTML = rows.map((n,i)=>`
      <tr data-idx="${i}">
        <td class="strong">${n.name}<div style="font-size:var(--fs-xs);color:var(--text-4);">${n.id}</div></td>
        <td><span class="chip">${n.subject}</span></td>
        <td style="text-align:right" class="num">${n.relations}</td>
        <td><span class="chip ${meta[n.status].tone}">${meta[n.status].text}</span></td>
        <td>${n.annotator}</td><td class="num">${n.updatedAt}</td>
      </tr>`).join('');
    document.querySelectorAll('#tbl tbody tr').forEach(tr=>tr.addEventListener('click',()=>openNode(rows[+tr.dataset.idx])));
  }
  render(list.slice(0,26));

  function openNode(n){
    window.__openDrawer(`
      <div class="drawer-meta">
        <div class="row"><span class="k">ID</span><span class="v">${n.id}</span></div>
        <div class="row"><span class="k">学科</span><span class="v">${n.subject}</span></div>
        <div class="row"><span class="k">状态</span><span class="v">${meta[n.status].text}</span></div>
        <div class="row"><span class="k">关系数</span><span class="v num">${n.relations}</span></div>
        <div class="row"><span class="k">标注人</span><span class="v">${n.annotator}</span></div>
        <div class="row"><span class="k">更新</span><span class="v num">${n.updatedAt}</span></div>
      </div>
      <div class="drawer-section"><h4>相邻概念与关系</h4>
        <div style="display:flex;flex-direction:column;gap:6px;">${n.neighbors.map(ne=>`
          <div style="display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg);border-radius:var(--r-sm);font-size:var(--fs-sm);">
            <span style="color:var(--text-2);">${ne.name}</span>
            <span class="chip ${ne.type==='prerequisite'?'info':ne.type==='contains'?'success':ne.type==='synonym'?'purple':''}">${rt[ne.type]}</span>
          </div>`).join('')}</div>
      </div>`, n.name);
  }

  initTableSort('#tbl');
  const filter=()=>{const sub=document.getElementById('f-subject').value,st=document.getElementById('f-status').value,rel=document.getElementById('f-reltype').value,q=document.getElementById('f-search').value.toLowerCase();
    render(list.filter(n=>(!sub||n.subject===sub)&&(!st||n.status===st)&&(!q||n.name.toLowerCase().includes(q))&&(!rel||n.neighbors.some(ne=>rt[ne.type]===rel))).slice(0,30));};
  ['f-subject','f-status','f-reltype'].forEach(id=>document.getElementById(id).addEventListener('change',filter));
  document.getElementById('f-search').addEventListener('input',filter);
  lucide.createIcons();
});
</script>
</body></html>
