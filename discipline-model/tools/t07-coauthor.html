<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>T07 协同创作 · 学科大脑</title>
<link rel="stylesheet" href="assets/tokens.css" /><link rel="stylesheet" href="assets/style.css" />
</head><body data-page="t07">
<div class="layout">
  <aside class="sidebar" id="sidebar-mount"></aside>
  <main class="main">
    <header class="topbar"><div><span class="title">协同创作</span><span class="crumbs">生态与应用 / T07 协同创作</span></div>
      <div class="search"><i data-lucide="search" width="14" height="14"></i><input placeholder="搜索协作组" /></div></header>
    <div class="content">
      <section class="page-header">
        <div class="left"><span class="code-badge">T07</span><div><h1>师生共建平台</h1><div class="subtitle">跨院系联合编撰讲义 / 习题 / 案例，贡献度排名与运营看板</div></div></div>
        <div class="actions"><button class="btn"><i data-lucide="user-plus" width="14" height="14"></i>招募成员</button>
          <button class="btn btn-primary"><i data-lucide="plus" width="14" height="14"></i>发起协作</button></div>
      </section>
      <section class="kpi-row" id="kpi-row"></section>
      <section class="filter-bar">
        <select id="f-type"><option value="">全部类型</option><option value="lecture">讲义</option><option value="exercises">习题集</option><option value="case">案例</option><option value="paper">论文</option></select>
        <select id="f-subject"><option value="">全部学科</option></select>
        <select id="f-status"><option value="">全部状态</option><option value="recruiting">招募中</option><option value="drafting">编撰中</option><option value="published">已发布</option></select>
        <input id="f-search" class="search-input" type="text" placeholder="搜索协作组名称" />
        <span class="spacer"></span><button class="btn btn-sm">贡献榜</button>
      </section>
      <div class="card-grid" id="grid"></div>
    </div>
  </main>
</div>
<aside class="drawer" id="drawer"><div class="drawer-head"><span class="title">协作组详情</span><button class="close"><i data-lucide="x" width="16" height="16"></i></button></div><div class="drawer-body"></div></aside>
<div class="drawer-mask" id="drawer-mask"></div>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="assets/data.js"></script><script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const S=window.MOCK.coStats, list=window.MOCK.coGroups, meta=window.MOCK.coStatusMeta, tm=window.MOCK.coTypeMeta;
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-card"><div class="label">活跃协作组</div><div class="value">${S.activeGroups}<span class="unit">个</span></div><div class="delta up">↑ 3</div></div>
    <div class="kpi-card"><div class="label">贡献 commits</div><div class="value">${window.fmtNum(S.contributions)}<span class="unit">次</span></div><div class="delta up">↑ 12%</div></div>
    <div class="kpi-card"><div class="label">周均提交</div><div class="value">${S.commitsPerWeek}<span class="unit">次/周</span></div><div class="delta up">↑ 8%</div></div>
    <div class="kpi-card"><div class="label">参与成员</div><div class="value">${S.members}<span class="unit">人</span></div><div class="delta flat">跨 12 学科</div></div>`;
  document.getElementById('f-subject').innerHTML += window.MOCK.subjects.map(s=>`<option value="${s}">${s}</option>`).join('');

  function render(rows){
    document.getElementById('grid').innerHTML = rows.map((g,i)=>`
      <div class="item-card" data-idx="${i}">
        <div class="card-head">
          <div>
            <div class="card-title">${g.name}</div>
            <div class="card-sub">${g.id} · 发起人 ${g.founder}${g.crossSchool?' · 跨院系':''}</div>
          </div>
          <span class="chip ${meta[g.status].tone}">${meta[g.status].text}</span>
        </div>
        <div style="display:flex;gap:6px;margin-top:2px;"><span class="chip">${g.subject}</span><span class="chip info">${tm[g.type]}</span></div>
        <div style="margin-top:10px;"><div style="display:flex;justify-content:space-between;font-size:var(--fs-xs);color:var(--text-3);margin-bottom:4px;"><span>进度</span><span class="num">${g.progress}%</span></div><div class="progress"><div class="fill" style="width:${g.progress}%"></div></div></div>
        <div class="card-meta">
          <div>成员 <span class="v">${g.members.length}</span></div>
          <div>提交 <span class="v">${g.members.reduce((s,m)=>s+m.commits,0)}</span></div>
          <div>更新 <span class="v num">${g.updatedAt}</span></div>
        </div>
      </div>`).join('');
    document.querySelectorAll('#grid .item-card').forEach(c=>c.addEventListener('click',()=>openCo(rows[+c.dataset.idx])));
  }
  render(list.slice(0,24));

  function openCo(g){
    window.__openDrawer(`
      <div class="drawer-meta">
        <div class="row"><span class="k">ID</span><span class="v">${g.id}</span></div>
        <div class="row"><span class="k">类型</span><span class="v">${tm[g.type]}</span></div>
        <div class="row"><span class="k">学科</span><span class="v">${g.subject}</span></div>
        <div class="row"><span class="k">发起人</span><span class="v">${g.founder}</span></div>
        <div class="row"><span class="k">状态</span><span class="v">${meta[g.status].text}</span></div>
        <div class="row"><span class="k">跨院系</span><span class="v">${g.crossSchool?'是':'否'}</span></div>
      </div>
      <div class="drawer-section"><h4>贡献榜（按字数）</h4>
        <ul class="contrib-list">${g.members.map(m=>`
          <li><span class="avatar">${m.name[0]}</span><span class="nm">${m.name} <span style="color:var(--text-4);font-size:10px;margin-left:4px;">${m.role}</span></span><span class="num">${m.words.toLocaleString()} 字 · ${m.commits} 次</span></li>`).join('')}</ul>
      </div>
      <div class="drawer-section"><h4>近期提交</h4>
        <div class="timeline">${g.recentCommits.map(c=>`<div class="item"><span class="at">${c.at}</span><span class="who">${c.by}</span><span class="action">${c.summary}</span></div>`).join('')}</div>
      </div>`, g.name);
  }

  const filter=()=>{const sub=document.getElementById('f-subject').value,st=document.getElementById('f-status').value,tp=document.getElementById('f-type').value,q=document.getElementById('f-search').value.toLowerCase();
    render(list.filter(g=>(!sub||g.subject===sub)&&(!st||g.status===st)&&(!tp||g.type===tp)&&(!q||g.name.toLowerCase().includes(q))).slice(0,30));};
  ['f-subject','f-status','f-type'].forEach(id=>document.getElementById(id).addEventListener('change',filter));
  document.getElementById('f-search').addEventListener('input',filter);
  lucide.createIcons();
});
</script>
</body></html>
