<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>T06 质量评测 · 学科大脑</title>
<link rel="stylesheet" href="assets/tokens.css" /><link rel="stylesheet" href="assets/style.css" />
</head><body data-page="t06">
<div class="layout">
  <aside class="sidebar" id="sidebar-mount"></aside>
  <main class="main">
    <header class="topbar"><div><span class="title">质量评测</span><span class="crumbs">质量优化 / T06 质量评测</span></div>
      <div class="search"><i data-lucide="search" width="14" height="14"></i><input placeholder="搜索评测任务" /></div></header>
    <div class="content">
      <section class="page-header">
        <div class="left"><span class="code-badge">T06</span><div><h1>质量评测工具</h1><div class="subtitle">对知识资产做多维度自动评分 + 人工抽检</div></div></div>
        <div class="actions"><button class="btn"><i data-lucide="download" width="14" height="14"></i>导出报告</button>
          <button class="btn btn-primary"><i data-lucide="play" width="14" height="14"></i>发起评测</button></div>
      </section>
      <section class="kpi-row" id="kpi-row"></section>
      <section class="filter-bar">
        <select id="f-target"><option value="">全部对象</option><option value="term">术语</option><option value="graph">图谱</option><option value="qa">问答</option><option value="doc">文档</option></select>
        <select id="f-subject"><option value="">全部学科</option></select>
        <select id="f-status"><option value="">全部状态</option><option value="running">评测中</option><option value="completed">已完成</option><option value="needs_revise">待修订</option><option value="queued">排队中</option></select>
        <input id="f-search" class="search-input" type="text" placeholder="搜索任务名" />
        <span class="spacer"></span><button class="btn btn-sm">批量重跑</button>
      </section>
      <div class="panel"><table class="data" id="tbl">
        <thead><tr><th>评测任务</th><th>对象</th><th>学科</th><th>轮次</th><th style="text-align:right">综合分</th><th style="text-align:right">准确</th><th style="text-align:right">一致</th><th style="text-align:right">完整</th><th>状态</th></tr></thead><tbody></tbody></table></div>
    </div>
  </main>
</div>
<aside class="drawer" id="drawer"><div class="drawer-head"><span class="title">评测详情</span><button class="close"><i data-lucide="x" width="16" height="16"></i></button></div><div class="drawer-body"></div></aside>
<div class="drawer-mask" id="drawer-mask"></div>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="assets/data.js"></script><script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const S=window.MOCK.evalStats, list=window.MOCK.evalTasks, meta=window.MOCK.evalStatusMeta, tm=window.MOCK.evalTargetMeta;
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-card"><div class="label">评测任务</div><div class="value">${S.total}<span class="unit">个</span></div><div class="delta up">↑ 22.8%</div></div>
    <div class="kpi-card"><div class="label">平均综合分</div><div class="value">${S.avgScore}<span class="unit">分</span></div><div class="delta up">↑ 1.2</div></div>
    <div class="kpi-card"><div class="label">评测对象</div><div class="value">${S.objects}<span class="unit">类</span></div><div class="delta flat">术语/图谱/问答/文档</div></div>
    <div class="kpi-card"><div class="label">累计轮次</div><div class="value">${S.rounds}<span class="unit">轮</span></div><div class="delta flat">R1 - R8</div></div>`;
  document.getElementById('f-subject').innerHTML += window.MOCK.subjects.map(s=>`<option value="${s}">${s}</option>`).join('');

  function scoreColor(v){ return v>=85?'success':v>=70?'info':v>=55?'warning':'danger'; }

  function render(rows){
    document.querySelector('#tbl tbody').innerHTML = rows.map((t,i)=>`
      <tr data-idx="${i}">
        <td class="strong" style="max-width:300px;"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.name}</div><div style="font-size:var(--fs-xs);color:var(--text-4);">${t.id}</div></td>
        <td><span class="chip">${tm[t.targetType]}</span></td>
        <td><span class="chip">${t.subject}</span></td>
        <td class="num">${t.round}</td>
        <td style="text-align:right;font-weight:600;" class="num"><span class="chip ${scoreColor(t.score)}">${t.score}</span></td>
        <td style="text-align:right" class="num">${t.accuracy}</td>
        <td style="text-align:right" class="num">${t.consistency}</td>
        <td style="text-align:right" class="num">${t.completeness}</td>
        <td><span class="chip ${meta[t.status].tone}">${meta[t.status].text}</span></td>
      </tr>`).join('');
    document.querySelectorAll('#tbl tbody tr').forEach(tr=>tr.addEventListener('click',()=>openEval(rows[+tr.dataset.idx])));
  }
  render(list.slice(0,24));

  function openEval(t){
    const issues = t.issues.slice(0,10);
    window.__openDrawer(`
      <div class="drawer-meta">
        <div class="row"><span class="k">ID</span><span class="v">${t.id}</span></div>
        <div class="row"><span class="k">对象类型</span><span class="v">${tm[t.targetType]}</span></div>
        <div class="row"><span class="k">学科</span><span class="v">${t.subject}</span></div>
        <div class="row"><span class="k">轮次</span><span class="v">${t.round}</span></div>
        <div class="row"><span class="k">覆盖条目</span><span class="v num">${t.coverage}</span></div>
        <div class="row"><span class="k">完成时间</span><span class="v num">${t.finishedAt}</span></div>
      </div>
      <div class="drawer-section"><h4>维度得分</h4>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${['accuracy','consistency','completeness'].map((k,ii)=>{const lbl=['准确性','一致性','完整性'][ii],v=t[k];return `
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:var(--fs-sm);"><span style="color:var(--text-2);">${lbl}</span><span class="num" style="color:var(--text-1);font-weight:500;">${v}</span></div>
              <div class="progress"><div class="fill" style="width:${v}%;background:${v>=85?'var(--success)':v>=70?'var(--info)':'var(--warning)'};"></div></div>
            </div>`}).join('')}
        </div>
      </div>
      <div class="drawer-section"><h4>Top 10 问题条目</h4>
        <div style="display:flex;flex-direction:column;gap:6px;">${issues.map(is=>`
          <div style="padding:10px 12px;background:var(--bg);border-radius:var(--r-sm);font-size:var(--fs-sm);">
            <div style="display:flex;justify-content:space-between;">
              <span style="color:var(--text-1);font-weight:500;">${is.itemName}（${is.itemId}）</span>
              <span class="chip ${scoreColor(is.score)}">${is.score}</span>
            </div>
            <div style="color:var(--text-3);font-size:var(--fs-xs);margin-top:2px;">建议：${is.suggestion}</div>
          </div>`).join('')}</div>
      </div>`, t.name);
  }

  initTableSort('#tbl');
  const filter=()=>{const sub=document.getElementById('f-subject').value,st=document.getElementById('f-status').value,tg=document.getElementById('f-target').value,q=document.getElementById('f-search').value.toLowerCase();
    render(list.filter(t=>(!sub||t.subject===sub)&&(!st||t.status===st)&&(!tg||t.targetType===tg)&&(!q||t.name.toLowerCase().includes(q))).slice(0,30));};
  ['f-subject','f-status','f-target'].forEach(id=>document.getElementById(id).addEventListener('change',filter));
  document.getElementById('f-search').addEventListener('input',filter);
  lucide.createIcons();
});
</script>
</body></html>
