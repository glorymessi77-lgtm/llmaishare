.unified-topbar .u-left{display:flex;align-items:center;gap:32px;}
.unified-topbar .u-logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:#23B283;text-decoration:none;}
.unified-topbar .u-mark{

  font-size:12px;color:#7B838C;padding:7px 13px;
  border:1px solid #E8ECF0;border-radius:999px;transition:.2s;
  text-decoration:none;display:inline-flex;align-items:center;gap:5px;

.unified-topbar .u-av{

<div class="unified-topbar">

<div class="layout">
  <aside class="sidebar" id="sidebar-mount"></aside>
  <main class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;">
        <span class="title">学科大脑</span>
        <span class="crumbs">面向清华大学全学科 · 学科大脑 · 工具层</span>
      </div>
      <div class="search">
        <i data-lucide="search" width="14" height="14"></i>
        <input placeholder="搜索工具、学科、术语…" />
      </div>
    </header>
    <div class="content">
      <section class="entry-hero">
        <h1>一站式学科大脑 · 工具层</h1>
        <p>围绕 数据接入 · 知识加工 · 质量治理 · 分发协作 四阶段，打通 10 个工具，服务教材沉淀、图谱构建、问答生成、智能体应用。</p>
      </section>

      <section class="kpi-row" style="margin-top:32px">
        <div class="kpi-card"><div class="label">系统工具</div><div class="value">10<span class="unit">个</span></div><div class="delta flat">覆盖 5 阶段</div></div>
        <div class="kpi-card"><div class="label">业务阶段</div><div class="value">4<span class="unit">段</span></div><div class="delta flat">数据自左向右流转</div></div>
        <div class="kpi-card"><div class="label">接入学科</div><div class="value">12<span class="unit">门</span></div><div class="delta up">↑ 3 门 近 30 日</div></div>
        <div class="kpi-card"><div class="label">活跃教师</div><div class="value">176<span class="unit">人</span></div><div class="delta up">↑ 4.1%</div></div>
      </section>

      <div id="stages"></div>
      <h3 style="margin:32px 0 12px;font-size:var(--fs-lg);">全部工具</h3>
      <div class="entry-grid" id="tool-grid"></div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const { tools, modules, stageMeta } = window.MOCK;
  document.getElementById('stages').innerHTML = `
    <h3 style="margin:32px 0 12px;font-size:var(--fs-lg);">4 大业务阶段</h3>
    <div class="stage-band">
      ${modules.map(m => `
        <div class="stage-item">
          <div class="idx">阶段 ${m.index}</div>
          <div class="title">${m.title}</div>
          <div class="desc">${m.desc}</div>
          <div class="bar"></div>
          <div style="margin-top:10px;font-size:var(--fs-xs);color:var(--text-3);">
            工具 ${m.tools} · 角色 ${m.role}
          </div>
        </div>`).join('')}
    </div>`;
  document.getElementById('tool-grid').innerHTML = tools.map(t => `
    <a class="entry-card" href="${t.path}">
      <span class="code">${t.code}</span>
      <div class="title">${t.name}</div>
      <div class="desc">${t.tagline}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:10px;border-top:1px dashed var(--border);font-size:var(--fs-xs);color:var(--text-3);">
        <span>本月调用 <span class="num" style="color:var(--text-1);font-weight:500;">${window.fmtNum(t.calls)}</span></span>
        <span>${window.renderDelta(t.delta)}</span>
      </div>
    </a>`).join('');
  lucide.createIcons();
});
</script>
</body>
